name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install app deps
        run: npm ci

      - name: Typecheck app
        run: npm run typecheck

      - name: i18n locale check
        run: npm run test:i18n

      # NOTE: `test:app` is introduced by the sibling PR feat/frontend-tests.
      # Merge order matters: feat/frontend-tests must land before this branch,
      # otherwise this step fails with "missing script: test:app". Deliberately
      # not made conditional -- see report for this branch.
      - name: App tests
        run: npm run test:app

      - name: KP fetch/parse test
        run: npm run test:kp

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Typecheck backend
        run: npm run typecheck

      - name: Build backend
        run: npm run build

      - name: Test backend
        run: npm test
