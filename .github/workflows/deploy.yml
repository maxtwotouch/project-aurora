name: Deploy backend to Fly.io

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "src/data/spots.json"
      - "fly.toml"
      - ".github/workflows/deploy.yml"

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # First-run bootstrap: create the app and its data volume if they do
      # not exist yet. Both commands are safe to re-run.
      - name: Ensure app exists
        run: flyctl apps create "$(grep '^app' fly.toml | cut -d'"' -f2)" || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Ensure data volume exists
        run: |
          APP="$(grep '^app' fly.toml | cut -d'"' -f2)"
          flyctl volumes list -a "$APP" | grep -q aurora_data || \
            flyctl volumes create aurora_data --region arn --size 1 -a "$APP" --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify health
        run: |
          APP="$(grep '^app' fly.toml | cut -d'"' -f2)"
          sleep 10
          curl -fsS "https://${APP}.fly.dev/v1/health" | head -c 500
